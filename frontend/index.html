<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sports Prediction System</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <section class="panel">
        <h2>AI Sports Prediction System</h2>

        <div class="controls">
            <label>
                Sport
                <select id="sport">
                    <option value="football">Football</option>
                    <option value="basketball">Basketball</option>
                </select>
            </label>

            <label>
                Home Team
                <input id="home" placeholder="Home Team" value="Arsenal">
            </label>

            <label>
                Away Team
                <input id="away" placeholder="Away Team" value="Liverpool">
            </label>

            <label>
                Home Odds
                <input id="odds" placeholder="Home Odds" value="2.2" type="number" min="1.01" step="0.01">
            </label>
        </div>

        <button id="run-analysis" type="button">Run AI Analysis</button>
    </section>

    <section class="panel" id="result">
        Results will appear here...
    </section>

</div>

<script src="app.js"></script>

</body>
</html>
